root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/server ./apps/server/"
  bin = "./tmp/server"
  delay = 1000
  exclude_dir = ["assets", "tmp", "vendor", "apps/web", "node_modules", ".git", "testdata"]
  exclude_regex = ["_test\\.go$"]
  include_ext = ["go", "toml", "yaml"]
  kill_delay = "0s"
  send_interrupt = true
  stop_on_error = true

[log]
  time = false

[misc]
  clean_on_exit = true
