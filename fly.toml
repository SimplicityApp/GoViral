app = 'goviral-api'
primary_region = 'sjc'

[build]

[env]
  HOME = '/home/goviral'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = '120s'
  interval = '30s'
  method = 'GET'
  timeout = '5s'
  path = '/api/v1/health'

[[vm]]
  size = 'shared-cpu-2x'
  memory = '1gb'

[mounts]
  source = 'goviral_data'
  destination = '/home/goviral/.goviral'
